repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.7
  hooks:
    # Run the formatter.
    - id: ruff-format
    # Run the linter.
    - id: ruff
      name: ruff-check
      args: [ --fix ]

- repo: local
  hooks:
    - id: ty
      name: ty-check
      entry: uv run ty check --error-on-warning
      language: system
      pass_filenames: true
      require_serial: true
      types_or: [python, pyi]
